<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Directory</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Honeybadger error tracking -->
  <!-- Load the Honeybadger JS client (v6.12) from their CDN -->
  <!-- Explicit https:// is required when running as a local file since there is no protocol to inherit -->
  <script src="https://js.honeybadger.io/v6.12/honeybadger.min.js" type="text/javascript"></script>
  <script type="text/javascript">
    // Initialize Honeybadger with project API key and environment label
    // This captures uncaught exceptions and unhandled promise rejections automatically
    Honeybadger.configure({
      apiKey: "hbp_LKgZxqIdsXDu7G99pJD5F4hkB4HpZX0E33Oz", // Project-specific API key for error reporting
      environment: "production", // Tags errors with the deployment environment
      // Forces error reporting even when running locally as a file,
      // bypassing the default development environment check
      reportData: true
    });
  </script>
</head>
<body>
  <header class="header">
    <h1>Employee Directory</h1>
    <div class="search-container">
      <input
        type="text"
        id="search-input"
        placeholder="Search by name or department..."
        aria-label="Search employees"
      >
      <select id="department-filter" aria-label="Filter by department">
        <option value="">All Departments</option>
      </select>
    </div>
  </header>

  <main class="main">
    <div id="employee-grid" class="employee-grid"></div>
    <p id="no-results" class="no-results" hidden>No employees found</p>
  </main>

  <script src="script.js"></script>
</body>

<!-- TODO: Remove this test script after confirming Honeybadger is receiving errors -->
<script type="text/javascript">
  Honeybadger.notify("Testing Honeybadger from spotlight-practice1!");
</script>
</html>
